name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          mapfile -d '' files < <(find bootstrap test -type f -name '*.sh' -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell scripts found in bootstrap/ or test/"
            exit 0
          fi
          shellcheck -S error "${files[@]}"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker test image
        run: docker build -t dotfiles-test .

      - name: Run test suite in Docker
        run: docker run --rm dotfiles-test
